---
- name: Set inotify limits
  ansible.builtin.sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    state: present
    sysctl_file: /etc/sysctl.d/99-kubernetes.conf
    reload: yes
  loop:
    - { key: "fs.inotify.max_user_instances", value: "8192" }
    - { key: "fs.inotify.max_user_watches", value: "131072" }

- name: Copy K3s config files
  copy:
    src: k3s/
    dest: /etc/rancher/k3s/
    owner: root
    group: root
    mode: "0644"

- name: Install k3s
  shell: "curl -sfL https://get.k3s.io | INSTALL_K3S_VERSION={{ k3s_version }} sh -"
  when: k3s_version != ""
  register: install_result_version
  changed_when: "'k3s installed' in install_result_version.stdout or install_result_version.rc == 0"

- name: Install k3s (latest)
  shell: curl -sfL https://get.k3s.io | sh -
  when: k3s_version == ""
  register: install_result_latest
  changed_when: "'k3s installed' in install_result_latest.stdout or install_result_latest.rc == 0"

- name: Wait for k3s to be ready
  command: k3s kubectl get nodes
  register: k3s_ready
  retries: 10
  delay: 5
  until: k3s_ready.rc == 0
  changed_when: false
